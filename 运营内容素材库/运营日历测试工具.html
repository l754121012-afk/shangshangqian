const xhsPosts = [{"day": 1, "title": "抽到这张签，今天运气不会差", "body": "每天第一件事就是抽一张今日签。\n不是算命，就是给自己今天定个方向。\n今天的签文说：把犹豫的事推进半步。\n刚好就是我最近在纠结的事。\n有点准。", "cta": "评论区置顶：微信小程序搜'今日上上签'，每天免费抽3张", "imageSuggestion": "分享卡片截图（经典模板）"}, {"day": 2, "title": "有人连续3天抽到大吉签", "body": "我抽到的是上上签。\n签文让我今天先收尾，别开新坑。\n太对了，我桌上还有3个做到一半的活儿。\n先做这些吧。", "cta": "置顶：你们今天抽到什么签？评论区晒图", "imageSuggestion": "抽卡结果截图 + 手机桌面背景"}, {"day": 3, "title": "焦虑的时候，抽张签冷静一下", "body": "签文说：焦虑的反义词是具体。\n把担心写下来，它就小了一半。\n我试了一下，真的有用。\n写下来之后发现，90%的事不会发生。", "cta": "置顶：今天心情不好的可以去抽一张，签文挺温柔的", "imageSuggestion": "签文特写截图 + 手写笔记照片"}, {"day": 4, "title": "这张彩蛋签，我抽了22次才抽到", "body": "彩蛋签概率4.5%，大概22次出1次。\n我抽了整整一周。\n终于抽到'桃花签'。\n签文说：今天适合主动联系想念的人。\n我去发了条消息。", "cta": "置顶：你们抽到彩蛋签了吗？是什么主题？", "imageSuggestion": "彩蛋签截图 + 聊天记录截图"}, {"day": 5, "title": "周末的签文总是特别温柔", "body": "周六抽了一张，签文让我给自己留15分钟什么都不做。\n我照做了。\n坐在阳台上发了15分钟呆。\n这周最舒服的15分钟。", "cta": "置顶：周末抽卡免费3次，去试试", "imageSuggestion": "周末场景照片 + 签卡截图"}, {"day": 6, "title": "我把抽到的签卡都收藏了", "body": "已经集齐了大吉签全套。\n获得了'大吉之人'称号。\n现在每天打开小程序第一件事就是看这个称号发光。\n有点成就感。", "cta": "置顶：你们集齐哪个等级的签卡了？", "imageSuggestion": "牌册截图 + 称号特写"}, {"day": 7, "title": "抽到解签怎么办？", "body": "今天抽到一张解签。\n本来有点慌。\n结果看完微行动之后发现，它让我直接面对那个卡住的事。\n做完之后反而轻松了。\n解签不是坏事，是提醒。", "cta": "置顶：抽到解签别慌，按微行动做一步就好了", "imageSuggestion": "解签截图 + 做完事后的心情记录"}, {"day": 8, "title": "7套分享模板，哪套最好看？", "body": "小程序里有7套分享模板。\n我最喜欢国风墨色那套。\n但朋友说好运爆棚那套发朋友圈点赞最多。\n你们喜欢哪套？", "cta": "置顶：去小程序抽卡后可以选模板生成分享图", "imageSuggestion": "7套模板拼图对比"}, {"day": 9, "title": "每天3分钟，比刷短视频有用", "body": "早上抽卡30秒。\n看签文1分钟。\n做微行动2分钟。\n一共不到4分钟。\n但这4分钟决定了我今天的第一件事做什么。\n比刷15分钟短视频有用多了。", "cta": "置顶：养成这个习惯真的不难，试试", "imageSuggestion": "时间对比图 / 日程截图"}, {"day": 10, "title": "抽到这张签后，我发了条朋友圈", "body": "大吉签。\n财气临门。\n签文说今天适合推进一个犹豫的机会。\n我发了那条酝酿很久的消息。\n对方回复了。\n有时候就差这一步。", "cta": "置顶：你们有没有因为一张签文而做了某件事？", "imageSuggestion": "分享卡片截图 + 朋友圈截图"}, {"day": 11, "title": "连续签到7天，称号升级了", "body": "从'稳步前行'升级到了'福星高照'。\n称号会显示在好友榜里。\n朋友问我这个称号怎么来的。\n我说集齐上上签全套就有了。\n她开始每天抽卡了。", "cta": "置顶：你们现在是什么称号？", "imageSuggestion": "称号截图 + 好友榜截图"}, {"day": 12, "title": "朋友问我这个APP在哪下的", "body": "发了张分享卡片到朋友圈。\n3个人来问我这是什么APP。\n我说微信小程序，搜'今日上上签'就行。\n不用下载，点开就能抽。\n现在他们每天早上也开始抽了。", "cta": "置顶：分享卡片真的有人会问，试试", "imageSuggestion": "朋友圈截图 + 分享卡片"}, {"day": 13, "title": "这张签的微行动，我每天都想做", "body": "上上签'步步高升'。\n微行动是：把昨天未完成的一件小事收尾。\n我连续做了3天。\n桌上堆积的事一件件变少了。\n比什么效率APP都管用。", "cta": "置顶：你们坚持最久的微行动是什么？", "imageSuggestion": "待办清单截图 + 签卡截图"}, {"day": 14, "title": "两周了，回头看我抽到的签", "body": "14张签卡。\n有3张大吉，5张上上，2张平签，1张解签。\n最准的是那张'贵人指路'。\n那天下午真的收到了合作邀约。\n不是迷信，是提醒我要留意。", "cta": "置顶：你们抽到的签里最准的是哪张？", "imageSuggestion": "14张签卡拼图 + 故事截图"}, {"day": 15, "title": "有人把签文当手机壁纸了", "body": "我把'稳住'那张签卡设成了壁纸。\n每次解锁手机都看到这两个字。\n真的有用。\n急躁的时候看到它会深呼吸一下。", "cta": "置顶：你们会把签卡设成壁纸吗？", "imageSuggestion": "手机壁纸截图 + 签卡原图"}, {"day": 16, "title": "彩蛋签的四种主题都集齐了", "body": "桃花、金榜、归家、远行。\n四张彩蛋签花了将近一个月。\n每张的图案都不一样。\n桃花签是粉色的，归家签是蓝色的。\n颜值真的高。", "cta": "置顶：你们集齐几种彩蛋签了？", "imageSuggestion": "4张彩蛋签拼图"}, {"day": 17, "title": "周中抽卡的人最少，所以...", "body": "周三去抽卡。\n人最少，好签概率好像真的高。\n今天抽到了大吉签。\n签文说今天遇到的人可能比我想的更愿意帮忙。\n下午真的有人主动帮我解决了问题。", "cta": "置顶：周三去抽，试试", "imageSuggestion": "周三日历截图 + 大吉签截图"}, {"day": 18, "title": "抽到平签不要急", "body": "今天抽到平签'小阻'。\n签文说今天慢一点不是坏事。\n我本来很沮丧。\n但按照签文说的，停下来看了看清哪里不顺。\n果然发现了一个之前忽略的问题。\n平签也有价值。", "cta": "置顶：抽到平签不是坏事，认真看签文", "imageSuggestion": "平签截图 + 发现问题后的记录"}, {"day": 19, "title": "这个小程序没有广告就好了", "body": "其实广告不算多。\n每天免费3次。\n第4次才需要看广告。\n而且看广告能抽补充签和转运卡。\n想想也能接受。\n毕竟不用充会员。", "cta": "置顶：每天免费3次，够用了", "imageSuggestion": "广告界面截图 + 免费次数说明"}, {"day": 20, "title": "我把签卡整理成一本电子手账", "body": "每天抽到的签卡都截图保存。\n按日期排列。\n回头看就像一本日记。\n能看到自己这一个月的状态起伏。\n比写日记轻松，但信息量差不多。", "cta": "置顶：你们会保存抽到的签卡吗？", "imageSuggestion": "电子手账排版截图"}, {"day": 21, "title": "21天了，养成习惯了", "body": "每天早上第一件事：抽卡。\n不用闹钟提醒。\n自然而然地就打开了。\n21天养成一个习惯，真的。\n这个习惯让我每天多了3分钟的自我对话。", "cta": "置顶：你也来养成这个习惯吧", "imageSuggestion": "21天打卡记录截图"}, {"day": 22, "title": "朋友问我这算不算算命", "body": "不算。\n它不预测未来。\n只是给你一个今天可以关注的方向。\n做不做还是你自己决定。\n我觉得更像每天的心理自检。", "cta": "置顶：不是算命，是心理仪式感工具", "imageSuggestion": "签文解读对比图"}, {"day": 23, "title": "抽卡前VS抽卡后的我", "body": "抽卡前：不知道今天该干嘛，刷手机。\n抽卡后：知道今天该优先做什么，有方向感。\n差距就是一张签卡。\n和3分钟的阅读时间。", "cta": "置顶：试试，真的不一样", "imageSuggestion": "对比图 / 日程前后对比"}, {"day": 24, "title": "这个微行动只有10个字", "body": "发出一条能推动事情的小消息。\n10个字。\n我做了。\n结果推进了一个拖了两周的事。\n有时候就是缺一个具体的行动指令。", "cta": "置顶：你们做过最有用的微行动是什么？", "imageSuggestion": "微行动截图 + 成果截图"}, {"day": 25, "title": "抽到重复签卡怎么办？", "body": "会重复的。\n但同一张签卡，不同 days 看感受不一样。\n上次抽到'稳住'，我觉得是废话。\n这次抽到，我觉得是提醒。\n因为心态变了。", "cta": "置顶：重复签也有新感受", "imageSuggestion": "同一张签卡不同日期的截图对比"}, {"day": 26, "title": "月底了，回顾这个月的签运", "body": "大吉签4张，上上签8张，平签3张，解签1张。\n最准的是'财气临门'那天，真的有一笔收入到账。\n最意外的是'小阻'那天，避免了 一个错误决定。\n签卡不是预言，是镜子。", "cta": "置顶：你们这个月最准的签是哪张？", "imageSuggestion": "月度签运统计图"}, {"day": 27, "title": "周末抽卡VS工作日抽卡", "body": "工作日的签文偏行动导向。\n周末的签文偏休息导向。\n设计的人想得挺周到的。\n不会周末还让你去拼工作。", "cta": "置顶：周末去抽，感受一下区别", "imageSuggestion": "工作日签卡VS周末签卡对比"}, {"day": 28, "title": "我把签文读给朋友听", "body": "每天读一条签文给朋友。\n成了我们的早安仪式。\n她也开始抽了。\n现在两个人每天比谁的签更准。\n挺有意思的。", "cta": "置顶：拉朋友一起抽，比手气", "imageSuggestion": "聊天截图 + 两人签卡对比"}, {"day": 29, "title": "这个小程序的UI真的好看", "body": "暗红+金色的配色。\n签卡设计有质感。\n分享模板7套各有风格。\n彩蛋签还有动态特效。\n作为一个免费小程序，视觉真的用心了。", "cta": "置顶：审美在线，去看看", "imageSuggestion": "UI细节截图合集"}, {"day": 30, "title": "一个月了，我推荐你试试", "body": "30天，每天3分钟。\n90分钟，换一个每天有点方向感的自己。\n不亏。\n不是广告，是真的觉得有用。\n去微信小程序搜'今日上上签'。\n免费的。", "cta": "置顶：置顶评论放小程序入口", "imageSuggestion": "30天签卡合集长图"}];
const mpArticles = [{"id": "week1-intro", "title": "为什么我每天花3分钟做这件事？", "subtitle": "不是算命，是一种新的心理仪式感", "publishWeek": 1, "sections": [{"heading": "我为什么会做这个小工具", "content": "上个月有段时间特别焦虑。每天早上醒来不知道今天该干嘛，刷半小时手机才能清醒。后来我发现，人需要的不是更多的信息，而是一个'今天从这里开始'的锚点。\n\n于是做了这个小程序。每天早上抽一张签，看一句签文，做一件小事。3分钟。\n\n不是算命。签文不预测未来，只是给你一个今天可以关注的方向。做不做，还是你自己决定。"}, {"heading": "这30天我抽到了什么", "content": "大吉签4张，上上签8张，平签3张，解签1张。\n\n最准的是'贵人指路'那天。签文让我留意身边主动给建议的人。当天下午，一个很久没联系的朋友发来一条消息，带来了一个合作机会。\n\n最意外的是'小阻'那天。抽到的时候有点沮丧，但签文说'今天慢一点不是坏事'。我停下来检查了一下正在推进的项目，发现了一个之前忽略的风险。\n\n签卡不是预言，是镜子。"}, {"heading": "适合什么样的人", "content": "- 每天早上醒来有点迷茫的人\n- 想要一点仪式感但不想太复杂的人\n- 觉得传统算命太沉重，但偶尔想听听'建议'的人\n- 喜欢收集、打卡、完成小目标的人\n\n不适合：\n- 想找'大师'改命的人\n- 希望签卡直接告诉你股票买哪只的人\n- 觉得3分钟也是浪费时间的人"}, {"heading": "怎么开始", "content": "很简单。\n\n微信小程序搜索'今日上上签'，不用下载，点开就能抽。\n\n每天免费3次。抽完看签文，做微行动。\n\n集齐一套签卡还能获得称号。\n\n就这么简单。"}], "cta": "点击下方的'今日上上签'小程序卡片，去抽你的第一张签。"}, {"id": "week2-collection", "title": "我集齐了所有大吉签，获得了这个称号", "subtitle": "牌册系统的隐藏乐趣", "publishWeek": 2, "sections": [{"heading": "从一张到一套", "content": "刚开始只是每天抽一张，看完就忘了。\n\n后来发现有个'牌册'功能，抽到的签卡会自动收藏。看着牌册里一张张亮起来的卡片，突然有了集齐的冲动。\n\n大吉签有4张，上上签有5张，上签4张，平签4张。还有彩蛋签。\n\n集齐同一等级的全部签卡，会获得一个称号。"}, {"heading": "称号系统", "content": "集齐大吉签 → '大吉之人'\n集齐上上签 → '福星高照'\n集齐上签 → '稳步前行'\n集齐平签 → '波澜不惊'\n集齐彩蛋签 → '奇遇收藏家'\n\n称号会显示在顶部品牌区，也会显示在好友榜里。\n\n'大吉之人'的称号还有特殊的金红渐变特效和烟花粒子动画。看到它发光的时候，真的有点成就感。"}, {"heading": "彩蛋签是最难的", "content": "彩蛋签概率4.5%，大概22次出1次。\n\n有四种主题：桃花签（粉色）、金榜签（金色）、归家签（蓝色）、远行签（青绿色）。\n\n每张都有独特的底纹图案和边框流光特效。\n\n我花了将近一个月才集齐四种。\n\n集齐'奇遇收藏家'称号的时候，它显示的是彩虹渐变流动效果。\n\n值。"}, {"heading": "不只是收集", "content": "回头看牌册里30多张签卡，像一本浓缩的月度日记。\n\n能看到自己什么时候状态好（大吉签多），什么时候需要调整（平签多），什么时候在回避问题（解签出现）。\n\n数据不会撒谎。"}], "cta": "去小程序看看你现在的牌册里有多少张签卡了。"}, {"id": "week3-share", "title": "分享率最高的签卡，居然是这一张", "subtitle": "我们用数据找到了社交裂变的秘密", "publishWeek": 3, "sections": [{"heading": "哪张签最常被分享", "content": "上线第一周，我们统计了所有分享行为。\n\n分享率最高的不是大吉签，是'贵人指路'。\n\n其次是'财气临门'。\n\n原因可能很简单：大吉签的签文更具体，更容易让人产生'这说的就是我'的感觉。\n\n而平签的分享率最低。不是因为不好，是因为人们不太愿意分享'今天运气一般'。"}, {"heading": "7套分享模板，哪套最好看", "content": "经典签文版：最像传统签卡，长辈也喜欢\n极简文字版：年轻人最爱，发朋友圈高级感\n国风墨色版：小红书点赞率最高\n职场加油版：工作日早上转发最多\n周末治愈版：周六周日使用频率最高\n情绪日记版：深夜时段突然变多\n好运爆棚版：颜色最鲜艳，视觉冲击最强\n\n建议：不同场景用不同模板。早上职场版，周末治愈版，深夜情绪版。"}, {"heading": "分享文案怎么写", "content": "我们测试了几种文案风格：\n\n1. 直接型：'今天抽到的签，有点准' → 点击率中等\n2. 悬念型：'这张签说的好像是你' → 点击率最高\n3. 情感型：'焦虑的时候，抽张签冷静一下' → 转发率最高\n4. 数据型：'连续7天抽到大吉签的概率是？' → 评论率最高\n\n结论：悬念型标题+情感型正文，组合效果最好。"}, {"heading": "裂变的核心", "content": "不是让用户觉得'这个工具很厉害'。\n\n是让抽卡的人觉得'这张签说的就是我'。\n\n然后自然想分享给身边的人。\n\n最好的裂变不是'帮我转发'，是'你也来试试这个准不准'。"}], "cta": "去小程序抽一张签，生成你的专属分享图。"}, {"id": "week4-holiday", "title": "节日限定签卡来了，只出现3天", "subtitle": "中秋/国庆/元旦，专属签卡+专属视觉", "publishWeek": 4, "sections": [{"heading": "为什么做节日限定", "content": "日常签卡是通用的。\n\n但节日的时候，人的情绪状态和日常不一样。\n\n中秋想团圆，国庆想放松，元旦想规划。\n\n通用签文很难精准匹配这些情绪。\n\n所以我们做了节日限定签卡。"}, {"heading": "中秋限定：月圆+团圆", "content": "专属签卡'月圆'：今天适合给在意的人发一句问候。\n\n专属签卡'团圆'：不管多远，心意到了就是团圆。\n\n背景换成深紫蓝色，金色点缀。\n\n抽到中秋签卡的人，分享率比平时高40%。\n\n因为节日情绪本身就是社交货币。"}, {"heading": "节日签卡怎么玩", "content": "1. 节日当天打开小程序，自动切换节日主题\n2. 抽到专属签卡的概率提升\n3. 专属签卡有独特的视觉设计和文案\n4. 集齐全年节日签卡，可获得隐藏称号\n\n今年已规划节日：\n- 中秋（3天）\n- 国庆（7天）\n- 元旦（3天）\n- 情人节（1天）\n- 劳动节（3天）\n- 端午（3天）"}, {"heading": "下一个节日是？", "content": "看看日历，下一个节日不远了。\n\n到时候记得打开小程序，抽一张节日限定签卡。\n\n只有那几天有。\n\n错过了就要等一年。"}], "cta": "去小程序看看现在的节日主题签卡。"}];

 "caption": "3个人来问在哪抽的"}], "bgm": "轻快活泼BGM", "caption": "分享出去，真的有人会问", "hashtags": "#分享 #朋友圈 #社交 #裂变 #小程序"}];

function getPhase(day) {
  if (day <= 7) return '种子测试阶段（30-50人内测）';
  if (day <= 14) return '冷启动W1（验证分享率）';
  if (day <= 21) return '冷启动W2（验证广告留存）';
  return '首月冲刺（完成3次迭代）';
}

function getWeekDay(day) {
  const days = ['周日','周一','周二','周三','周四','周五','周六'];
  // 假设第1天是周一
  return days[day % 7];
}

function renderCalendar() {
  const grid = document.getElementById('calendar');
  grid.innerHTML = '';
  
  // 星期标题
  const headers = ['一','二','三','四','五','六','日'];
  headers.forEach(h => {
    const el = document.createElement('div');
    el.className = 'cal-header';
    el.textContent = h;
    grid.appendChild(el);
  });
  
  // 第1天是周一，前面不需要空白
  for (let w = 1; w <= 5; w++) {
    const label = document.createElement('div');
    label.className = 'week-label';
    label.textContent = '第' + w + '周';
    grid.appendChild(label);
    
    for (let d = 1; d <= 7; d++) {
      const dayNum = (w-1)*7 + d;
      if (dayNum > 30) break;
      
      const el = document.createElement('div');
      el.className = 'cal-day' + (dayNum === currentDay ? ' active' : '');
      el.onclick = () => selectDay(dayNum);
      
      const num = document.createElement('div');
      num.className = 'd-num';
      num.textContent = dayNum;
      el.appendChild(num);
      
      const tags = document.createElement('div');
      tags.className = 'd-tags';
      tags.innerHTML = '<div class="d-tag tag-wx"></div><div class="d-tag tag-xhs"></div>';
      if ([1,8,15,22].includes(dayNum)) tags.innerHTML += '<div class="d-tag tag-mp"></div>';
      if ([3,10,17,24].includes(dayNum)) tags.innerHTML += '<div class="d-tag tag-dy"></div>';
      el.appendChild(tags);
      
      grid.appendChild(el);
    }
  }
}

function selectDay(day) {
  currentDay = day;
  renderCalendar();
  renderDay();
}

function prevDay() { if (currentDay > 1) selectDay(currentDay - 1); }
function nextDay() { if (currentDay < 30) selectDay(currentDay + 1); }

function renderDay() {
  document.getElementById('day-num').textContent = currentDay;
  document.getElementById('day-meta').textContent = '上线第' + currentDay + '天 · ' + getWeekDay(currentDay) + ' · ' + getPhase(currentDay);
  
  // 微信群
  const wx = wxPosts.find(p => p.day === currentDay);
  if (wx) {
    document.getElementById('wx-content').textContent = wx.greeting + '\n\n' + wx.hook + '\n\n' + wx.cta;
    document.getElementById('wx-status').textContent = '待发布';
    document.getElementById('wx-status').className = 'platform-status';
  }
  
  // 小红书
  const xhs = xhsPosts.find(p => p.day === currentDay);
  if (xhs) {
    document.getElementById('xhs-title').textContent = xhs.title;
    document.getElementById('xhs-content').textContent = xhs.body;
    document.getElementById('xhs-image').textContent = xhs.imageSuggestion;
    document.getElementById('xhs-status').textContent = '待发布';
    document.getElementById('xhs-status').className = 'platform-status';
  }
  
  // 公众号（每周一）
  const weekNum = Math.ceil(currentDay / 7);
  const mp = mpArticles.find(a => a.publishWeek === weekNum);
  const mpEl = document.getElementById('mp-content');
  const mpStatus = document.getElementById('mp-status');
  if (mp && currentDay % 7 === 1) {
    mpEl.innerHTML = '<strong>' + mp.title + '</strong><br><span style="color:var(--muted);">' + mp.subtitle + '</span><br><br>' + mp.sections.map(s => '<strong>' + s.heading + '</strong><br>' + s.content.substring(0, 80) + '...').join('<br><br>');
    mpStatus.textContent = '本周发布';
    mpStatus.className = 'platform-status';
  } else {
    mpEl.innerHTML = '<span class="empty">本周暂无公众号文章，公众号每周一发布</span>';
    mpStatus.textContent = '本周无';
    mpStatus.className = 'platform-status pending';
  }
  
  // 抖音（每周三）
  const dy = dyScripts.find((s, i) => i + 1 === weekNum);
  const dyEl = document.getElementById('dy-content');
  const dyStatus = document.getElementById('dy-status');
  if (dy && currentDay % 7 === 3) {
    dyEl.innerHTML = '<strong>' + dy.title + '</strong>（' + dy.duration + '）<br><br>' + dy.scenes.map(sc => '<strong>' + sc.time + '</strong> ' + sc.visual).join('<br>');
    dyStatus.textContent = '本周拍摄';
    dyStatus.className = 'platform-status';
  } else {
    dyEl.innerHTML = '<span class="empty">本周暂无抖音视频，抖音每周三发布</span>';
    dyStatus.textContent = '本周无';
    dyStatus.className = 'platform-status pending';
  }
  
  // 清空模拟数据
  document.getElementById('sim-wx').value = '';
  document.getElementById('sim-xhs-like').value = '';
  document.getElementById('sim-new').value = '';
  document.getElementById('sim-share').value = '';
}
