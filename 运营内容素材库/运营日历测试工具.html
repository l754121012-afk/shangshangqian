const wxPosts = [{"day":1,"greeting":"又是周一。闹钟响的时候我认真思考了要不要辞职。","body":"看到新闻说可控核聚变超导磁体完工了，人造太阳快了。我还在工位上晒不到太阳。\n今天抽了张签，说宜'主动推进'。好吧，推进那个拖了三天的PPT。\n朋友圈有人发西江洪水的视频，南方朋友们注意安全。","afterthought":"今天签文说发出一条能推动事情的小消息。我选择了给甲方发那条改了八百遍的方案。","cardName":"财气临门"},{"day":2,"greeting":"周二了，这周才刚开始就已经觉得很漫长了。","body":"今天签文说'留意主动给你建议的人'。上午开会的时候，有个不太熟的同事说了一嘴思路，居然真的有用。好吧，算我欠他一杯咖啡。\n高考志愿填报快结束了，表弟还在纠结选什么专业。我说你抽个签算了，他白了我一眼。","afterthought":"有人问我最近怎么有点不一样。我说可能是最近睡得还行吧。你猜。","cardName":"贵人指路"},{"day":3,"greeting":"周三了，一周过半的标志就是开始盼周五。外面天热得像蒸笼。","body":"今天太热了。签文说'焦虑的反义词是具体'。把担心的事全写下来，发现90%根本不会发生。这个方法免费且有效，推荐给所有焦虑星人。\n看到说某地又出现泥石流预警了，这年头的夏天真的不让人省心。","afterthought":"如果你最近也莫名其妙焦虑，把担心的事写下来试试。真的有用。","cardName":"财源广进"},{"day":4,"greeting":"周四早安。西江那边的洪水新闻看得我揪心，南方的朋友还好吗。","body":"西江洪水已经好几天了，看新闻说水位在慢慢下降，希望受灾的朋友都能平安。\n今天签文说'今天慢一点不是坏事'，我想骂它因为确实戳中了我一直在赶进度这件事。然后真的停下来检查了一遍，发现一个差点出问题的数据。","afterthought":"有时候不是它准，是你刚好需要一个理由停下来。","cardName":"桃花"},{"day":5,"greeting":"周五早上好！再撑一天就是周末。高考志愿填报系统今天关闭了吧。","body":"高考志愿填报系统据说今天关闭。想起自己当年填志愿的时候，全家人围在一起翻志愿书，那种紧张感现在还记得。\n今天的签说'把犹豫的事推进半步'。我给那个拖了两周没联系的客户发了消息，秒回。好吧，有些事真的就差那一下。","afterthought":"有些事就差一秒钟的勇气。它没直接给我勇气，只是提醒我了。","cardName":"一帆风顺"},{"day":6,"greeting":"周六早上好。终于不用定闹钟了，结果还是六点半醒了。打工人的生物钟。","body":"周末签的语气都不一样，温柔了很多。说'给自己留15分钟什么都不做'。\n于是在阳台上坐着发了会儿呆，这是我本周最舒服的15分钟。\n看新闻说高温预警又升级了，这夏天到底是有多热。","afterthought":"不是矫情。是真的好久没有什么都不做了。推荐你也试试。","cardName":"锦绣前程"},{"day":7,"greeting":"周日早安。明天又周一了，想到这里就开始叹气。不过这周好像过得还行。","body":"一周下来抽了七张签。最准的是周三那张——说焦虑的反义词是具体，我写了焦虑清单之后真的好了很多。\n下周还会不会继续？说不准。但今天已经抽了。\n听说洪水那边开始退了，希望受灾的人能尽快恢复正常生活。","afterthought":"下周还会不会继续？说不准。但今天已经抽了。你们猜准不准。","cardName":"紫气东来"},{"day":8,"greeting":"又是周一。为什么周一永远比周日快？昨晚乘风2026总决赛看了吗。","body":"昨晚看乘风2026总决赛，真的太好看了。那几个舞台绝了。\n今天的签说'留意主动给你建议的人'，又是这句？好吧，我会注意的。\n上午开会的时候一个新来的实习生居然提出了一个不错的点子，年轻人果然不一样。","afterthought":"说巧合也行，说运气也行。反正我信了那么一点点。","cardName":"稳步进财"},{"day":9,"greeting":"周二。同事今天来公司黑眼圈特别重，问他怎么了，他说看乘风看到凌晨三点。","body":"乘风2026虽然结束了但余热还在，今天办公室茶水间的热门话题还是总决赛排名。\n签文今天只一句话，看完在工位上愣了三秒。它说的那个微行动，就十个字，做了之后一个拖了两周的事往前推了一大截。\n十个字啊。比领导开半小时会说的话管用。","afterthought":"有时候不是不知道该做什么，是缺一个具体的指令吧。","cardName":"步步高升"},{"day":10,"greeting":"周三早安。天也太热了。看了个帖子说AI已经在写代码画图写文案了，我看了看我手头的工作陷入了沉思。","body":"看了个帖子说AI已经在写代码画图写文案了。看了看自己手头的工作，突然不知道该开心还是该慌。\n签文说'大胆表达你的想法'。于是我在会上说了一个拖了很久的想法，居然被采纳了。也许AI暂时还替代不了在会议室里敢说话的人吧。","afterthought":"但好骗归好骗，有用是有用的。心态确实稳了不少。","cardName":"金榜"},{"day":11,"greeting":"周四。今天部门开了个会，会上有人提了句'降本增效'，整个会议室的空气都凝固了。","body":"今天部门开会有人提'降本增效'，整个会议室空气凝固。散会之后大家都在小群里吐槽。\n签文说'主动汇报进度'。我给老板发了周报，措辞特别小心。结果老板回复说'干得不错'。悬着的心放下来了。","afterthought":"AI替代不了在会议室敢发言的人。至少目前是这样。大概。","cardName":"转机将至"},{"day":12,"greeting":"周五早上好！这周过了一个大新闻，某大厂又裁员了20%。朋友圈瞬间炸了。","body":"某大厂又裁员20%的消息刷屏了。朋友圈各种焦虑发言，有人转了那个'牛马也有尊严'的段子。\n今天的签说'不要在低谷做决定，但要在低谷做准备'。看完之后默默打开了招聘网站，不是要跳槽，就是看看行情。","afterthought":"你永远不知道明天会来什么消息。但你可以控制今天做一件小事。","cardName":"开门见财"},{"day":13,"greeting":"周六。睡到自然醒，刷到乘风2026总决赛的cut，陈丽君那段舞台真的绝了。","body":"乘风2026总决赛的cut还在热搜上。今天看了几个选手的reaction视频，好几个看哭了。\n签文说'主动帮别人一个小忙'，下午帮实习生debug了一个小时。虽然累但看到他终于跑通的那一刻还挺有成就感的。","afterthought":"不确定是不是运气，但这周确实发生了几件意料之外的好事。","cardName":"福星高照"},{"day":14,"greeting":"周日。上周发的那张签说'留意主动给你建议的人'，这周真的有人主动帮了我一把。虽然不确定是巧合还是运气，但确实发生了。","body":"这周过完了。回头看了一下，签文说的那些事真的去做了大半。不确定是运气还是巧合，但确实发生了一些变化。\n下周又是新的周一了。AI焦虑和裁员消息还会继续，但好像心态稳了一点点。","afterthought":"等回复中。不急。反正该做的做了。签文说的对。","cardName":"时来运转"},{"day":15,"greeting":"周一早安。7月1日，香港回归29周年了。朋友圈好多人发了维港的烟花照片。","body":"7月1日，香港回归29周年。朋友圈好多人发了维港夜景照，好漂亮。\n今天的签说'今天适合开启新项目或新合作'。我鼓起勇气给一个一直想合作但没开口的人发了消息。\n等回复中。手心在出汗。","afterthought":"天塌不下来。写下来就知道了。这周学到最有用的一件事。","cardName":"财气临门"},{"day":16,"greeting":"周二。今天出门忘涂防晒了，回来一看脸红了两个色号。夏天的紫外线是真的毒。","body":"出门忘涂防晒，脸直接红了两个色号。夏天的紫外线是真的不讲道理。\n签文说'焦虑的反义词是具体'——等等这个上周出现过。好吧，这周焦虑的事不一样了。这次焦虑的是房租续签的问题。\n写下来之后发现，其实也就那样，天塌不下来。","afterthought":"三个月后的自己至少得有把舒服的椅子。这是最小目标了。","cardName":"归家"},{"day":17,"greeting":"周三了。刷到一个帖子说'牛马也有尊严'，底下评论区笑死我了。打工人共鸣太强了。","body":"刷到'牛马也有尊严'的帖子，评论区笑死我了。有人评论说'我已经从牛马进化成牛马精神了'。\n今天的签说'大胆想象三个月后的自己'。我闭上眼想了一下——三个月后的我应该已经搬了家、换了个舒服的椅子、不再吃食堂了吧。好吧，至少得买把椅子。","afterthought":"35度里慢一点真的比急躁好。至少没中暑。算它赢了。","cardName":"贵人指路"},{"day":18,"greeting":"周四早安。今天公司的空调 也想知道。","body":"新高铁线路开通的消息刷屏了，评论区全是'什么时候通到我家门口'。\n签文说'清理一下桌面和inbox'。我今天真的花了半小时整理邮件，删了一百多封不用回的，瞬间清爽了。这种小事做完之后心情真的会变好。","afterthought":"站在荷花池边什么都不想的那一刻，是这周最治愈的时刻。","cardName":"开门见财"},{"day":27,"greeting":"周六。终于去了趟北海看荷花展，荷花开得真的好漂亮，拍了好多照片。站在那里什么都不想，特别舒服。","body":"终于去了北海荷花展！荷花开得太好看了，满池粉色，站在那里什么都不想，特别治愈。\n签文说'给自己留15分钟什么都不做'。不用刻意留了，在荷花池边站着的每一分钟都是放空。拍了好多照片，选了几张特别满意的。","afterthought":"不知不觉已经成习惯了。一个月前打死我也不信。","cardName":"福星高照"},{"day":28,"greeting":"周日。明天又要开始了。不过想到下周就月底了，居然有种快要熬过沙漠的感觉。","body":"明天又是周一，月底了。这一个月过得说快也快，说慢也慢。从可控核聚变到洪水到乘风到地震到荷花展，这一个月的信息量也太大了。\n签文说'回顾这一个月的变化'。我翻了翻手机相册，这一个月的照片居然大部分是签卡截图。好吧，不知不觉已经成习惯了。","afterthought":"能想到规划开支，也算一种进步吧。虽然余额很惨。","cardName":"时来运转"},{"day":29,"greeting":"周一。月底了，这一个月过得说快也快说慢也慢。西江那边的洪水终于退了，看到救援队员满身泥水的照片，鼻子一酸。","body":"月底了。西江洪水终于退了，看到救援队员满身泥水席地而睡的照片，心里很不是滋味。\n签文说'做长远规划，看到的格局会更大'。看了眼银行余额和信用卡账单，觉得自己应该规划的不是三年后，而是下个月的开支。\n不过，能想到这里，好像也算一种进步吧。","afterthought":"台风天备点水和泡面总没错。人生建议，不谢。","cardName":"财气临门"},{"day":30,"greeting":"周二。7月最后一天了。这一个月抽了三十张签，有的准有的不准，但每天早上那三分钟成了习惯。明天8月了，新的一个月，新的签。","body":"7月30号，这个月最后的工作日了。台风消息又来了，防汛还没结束。\n这一个月从核聚变看到洪水看到高考志愿看到乘风看到裁员看到地震看到荷花展。信息过载到麻木。\n签文说'为下个月做好准备'。我觉得可以先准备一瓶水一袋泡面，然后再想别的。\n三十张签看完了，明天8月1号，新的一轮。居然有点期待。","afterthought":"三十张签看完了，明天新一轮。居然有点期待。这可能就是习惯的力量吧。","cardName":"贵人指路"}];
const xhsPosts = [{"day":1,"title":"我最近每天早上做一件事 朋友问我怎么了","body":"说出来有点离谱，我最近每天早上起来第一件事不是看手机，是打开一个东西抽一张'签'。\n本来觉得这种东西很玄的，我也不是迷信的人。\n但是！今天那张签说的就是我一直在纠结的事。\n看到可控核聚变的新闻说人造太阳快了，我还在工位上晒不到太阳。签文说宜'主动推进'。好吧，推进那个拖了三天的PPT。\n有点准到离谱了😅","afterthought":"朋友非要问我是从哪看到的。我说你猜呀～","imageSuggestion":"签卡截图+工位咖啡+新闻截图"},{"day":2,"title":"有人问我为什么最近状态变好了 说出来你可能不信","body":"没有没有，没有变好，只是好像知道每天该做什么了哈哈哈哈。\n以前每天早上醒来就是刷手机半小时然后开始焦虑。\n现在：起来→抽一张签→看签文→做一件小事→开始干活。\n总共3分钟。\n洪水新闻看得揪心，希望南方的朋友都平安。\n这3分钟让我的脑子从混乱变成了有条理。玄学吗？也许吧。但有用啊🙄","afterthought":"到底是不是运气我也说不清，反正坚持了几天感觉还行～","imageSuggestion":"早上工位照片+签卡截图+手机时间8:0x"},{"day":3,"title":"焦虑的时候我居然靠一张图冷静下来了","body":"今天中午特别焦虑，事情堆了一堆还看到不太好的消息。\n打开随便看了一眼今天的签文。\n'焦虑的反义词是具体'。\n啊？？？？？？\n就这句话让我愣了三秒。\n然后我找了个本子把焦虑的事全写下来。写完发现90%的事不会发生。\n瞬间冷静了。居然是被一张签文治好的😂","afterthought":"如果最近你也经常焦虑到睡不着，试试把它写下来。写完你就知道了。","imageSuggestion":"手写焦虑清单照片+签文截图"},{"day":4,"title":"抽了好多次终于抽到了这张 粉色发光的","body":"我最近每天在抽一个东西的签，有一个特别稀有的版本。\n概率大概4.5%，平均22次才出一次。我已经抽了快一周了。\n今天！！！！终于抽到了！！！\n粉色的！会发光的那种！！\n签文说'今天适合主动联系想念的人'。然后我给一个很久没联系的朋友发了条消息。她秒回了一大段话😭\n有些事不是不想做，是缺一个推力。","afterthought":"有些事不是不想做，是缺一个推力。这张签就是那个推力吧。","imageSuggestion":"彩蛋签截图（粉色发光版）+聊天记录打码"},{"day":5,"title":"高考志愿填报的最后一天 我弟问我选什么专业 我说","body":"高考志愿填报最后一天了，表弟问我选什么专业。\n我说要不你抽个签？他白了我一眼。\n但是讲真的，我自己遇到选择困难的时候确实会抽一张看看。\n不是说签文会告诉你答案，而是它给你的那个微行动，就是你一直在犹豫的那个选项。\n有时候你心里早就有答案了，只是需要一个人（或一张签）推你一把。\n最后表弟选了他一直想选的那个专业。也不知道是跟我聊完想通的，还是他自己想通的。","afterthought":"你们遇到选择困难的时候都会怎么做？评论区聊聊～","imageSuggestion":"签卡截图+高考志愿书照片"},{"day":6,"title":"周末做了一件特别治愈的小事 推荐给所有打工人","body":"周六早上这张签说：给自己留15分钟什么都不做。\n我一听就觉得：这也太奢侈了吧。\n但我真的照做了。搬了个椅子坐阳台上，什么都不想。\n15分钟后我进屋。\n这是我这周最舒服的15分钟。比刷手机比看剧比吃外卖都舒服。\n而且今天高温预警又升级了，能坐在阳台上吹风已经是最大的奢侈了🥺\n你有多久没有什么都不做了？哪怕只是10分钟。","afterthought":"你有多久没有什么都不做了？哪怕只是10分钟。","imageSuggestion":"阳台视角照片+签卡截图+一杯茶"},{"day":7,"title":"一周了 集齐了一套大吉签 有点上头","body":"连续抽了一周多，打开收藏一看。\n诶？？？？大吉签全套集齐了？？？\n还自动给了我一个称号叫'大吉之人'。\n虽然感觉有点幼稚但看到称号发光的那一刻居然有成就感😅\n洪水那边新闻还在更新，希望受灾的人平安。签文说'留意主动给你建议的人'这周居然真的有人帮了我一把。\n我就不发名字了，怕你们抽到了我觉得厉害的东西我没抽到😂","afterthought":"我就不发名字了，怕你们抽到了我觉得厉害的东西我没抽到😂","imageSuggestion":"牌册截图（集齐状态）+洪水新闻转发截图"},{"day":8,"title":"乘风2026总决赛看完之后我做了这件事","body":"昨晚看乘风2026总决赛，真的太好看了。\n看完之后我没有像往常一样刷手机到凌晨。\n而是打开了每天早上的那个东西，抽了张签。\n签文说：'留意身边主动给你建议的人'。\n我就突然想到今天开会的时候，有个实习生说了一个点子，当时觉得还行但没太在意。\n现在想想……好像真的可以用。\n总决赛最好的表演和签文最准的那句话，凑在一起的一天。","afterthought":"不知道你们看了没有，但我觉得总决赛最好的舞台和最准的签文居然凑在了同一天。","imageSuggestion":"乘风2026总决赛截图+签卡截图"},{"day":9,"title":"今天签文只有一句话 但我在工位上愣了三秒","body":"今天只一句话，但看完我在工位上愣了三秒。\n它说的那个微行动，就十个字。\n我做了。然后一个拖了两周的事往前推了一大截。\n十个字啊。\n比领导开半小时会说的话管用。\n比网上那些'职场干货'100篇加起来都管用。\n有时候不是不知道该做什么，是缺一个具体的指令。💡","afterthought":"有时候不是不知道该做什么，是缺一个具体的指令。十个字就够。","imageSuggestion":"签文特写截图+工位凌乱桌面"},{"day":10,"title":"AI已经会写代码画图写文案了 我的反应是","body":"看了个帖子说AI已经在写代码画图写文案了。\n我看了看自己手头的工作，陷入了沉思。\n然后打开了每天早上抽签的那个东西。\n签文说：'大胆表达你的想法'。\n于是我鼓起勇气在会上说了一个拖了很久的想法。\n居然被采纳了。\n也许AI暂时还替代不了在会议室里敢开口说话的人吧。😂\n至少今天是。","afterthought":"AI替代不了在会议室敢开口说话的人。至少目前是这样。","imageSuggestion":"AI生成内容截图+签卡截图+表情包"},{"day":11,"title":"领导说降本增效的时候 我默默看了眼这个","body":"今天部门开会领导说'降本增效'。\n整个会议室的空气都凝固了。\n散会后我打开签文一看：'主动汇报进度'。\n好吧。给老板发了周报，措辞特别小心。\n结果老板回了四个字：干得不错。\n悬着的心放下来了。\n有时候不是领导不认可你，是你没让他看到你干了什么。这个道理签文比领导讲得温柔。","afterthought":"不是领导不认可你，是你没让他看到你干了什么。这个道理签文比领导讲得温柔。","imageSuggestion":"招聘网站截图+签卡截图（打码处理）"},{"day":12,"title":"某大厂裁员20%之后 我打开了招聘网站","body":"某大厂又裁员20%。朋友圈瞬间炸了。\n各种焦虑发言，有人转了'牛马也有尊严'的段子。\n我也焦虑了。打开签文一看：\n'不要在低谷做决定，但要在低谷做准备'。\n嗯……于是我默默打开了招聘网站。\n不是要跳槽，就是看看行情。\n看完之后反而安心了一点——外面的世界虽然不确定，但至少不是没有路。\n签文有时候不是告诉你答案，是帮你冷静下来去想答案。","afterthought":"这个月被签文治愈的次数比被领导画的饼治愈的次数多多了😂","imageSuggestion":"乘风舞台cut截图+签卡截图"},{"day":13,"title":"乘风2026总决赛最好的舞台是哪一个 不接受反驳","body":"乘风2026总决赛的cut还在热搜上。\n今天看了几个选手的reaction视频，好几个看哭了。\n尤其是陈丽君那段，真的太绝了。\n签文说'主动帮别人一个小忙'。\n下午帮实习生debug了一个小时。虽然累但看到他终于跑通的那一刻还挺开心的。\n帮别人和被别人帮，好像都让人心情变好。这个月被签文治愈的次数比被领导画的饼治愈的次数多多了😂","afterthought":"心态稳了，做事就不慌了。也许这就是它的意义吧。","imageSuggestion":"两周签文合集截图+复盘笔记照片"},{"day":14,"title":"这个月最有用的发现 不是学会了一个新技能","body":"第二周过完了。\n回头看了看这两周的签文和做了的事。\n不确定是巧合还是运气，但确实发生了一些变化。\n看了乘风2026总决赛、经历了AI焦虑、听到了裁员消息。\n签文没有帮我解决任何实际问题。但它好像帮我稳住了心态。\n心态稳了，做事就不慌了。不慌了，事情反而推进得快了。\n也许这就是它的意义吧。","afterthought":"29年前的今天不知道是什么签。但29年后的今天，我至少敢开口了。","imageSuggestion":"维港烟花照片+签卡截图"},{"day":15,"title":"香港回归29年了 今天朋友圈全是维港烟花照","body":"7月1日，香港回归29周年。\n朋友圈好多人发了维港夜景照，真的太美了。\n今天的签说：'今天适合开启新项目或新合作'。\n我鼓起勇气给一个一直想合作但没开口的人发了消息。\n现在在等回复。手心在出汗。\n29年前的今天不知道是什么签。但29年后的今天，我至少敢开口了。\n这就是进步吧。","afterthought":"防晒没涂是脸红了，焦虑没处理是心态崩了。两个都是小事但都得处理。","imageSuggestion":"晒伤的自拍+签卡截图+防晒霜瓶子"},{"day":16,"title":"出门忘涂防晒 验证了一个残酷的事实","body":"出门忘涂防晒。回来一看脸红了两个色号。\n夏天的紫外线是真的不讲道理。\n签文说'焦虑的反义词是具体'。\n好吧，这周焦虑的事换了一个——房租续签的问题。\n写下来之后发现，其实也就那样，天塌不下来。\n防晒没涂是脸红了，焦虑没处理是心态崩了。两个都是小事，但都不处理就会变成大事。\n所以今天涂了防晒，也处理了焦虑。双杀。","afterthought":"打工人的尊严不在于工资多少，而在于你还在想要变好。","imageSuggestion":"牛马梗截图+签卡截图+工位照片"},{"day":17,"title":"牛马也有尊严 这条帖子评论区笑死我了","body":"刷到一条帖子：'牛马也有尊严'。\n评论区笑死我了。有人评论'我已经从牛马进化成牛马精神了'。\n签文说'大胆想象三个月后的自己'。\n我闭上眼想了想——三个月后的我应该搬了家、换了吧舒服的椅子、不再天天吃食堂了吧。\n好吧，先从买把椅子开始。一步一步来。\n打工人的尊严不在于工资多少，而在于你还在想要变好。","afterthought":"35度里慢一点确实比急躁好。活着就好。签文说对了。","imageSuggestion":"35度办公室照片+签卡截图+三个空水瓶"},{"day":18,"title":"公司空调坏了35度办公 我发现了续命的秘诀","body":"公司空调坏了。35度的办公室。\n所有人像热锅上的蚂蚁。\n签文说'今天慢一点不是坏事'。\n我想说今天不是快不快的问题，是能不能活着的问题。\n但仔细一想，35度里慢一点确实比急躁好，至少不会中暑。\n然后我喝了三瓶水，在工位上用一个小风扇对着脸吹。\n签文说对了，慢一点。活着就好。","afterthought":"签文没有预测到地震，但它提醒我该打电话了。有些事只需要去做。","imageSuggestion":"地震预警截图+签卡截图（模糊处理敏感信息）"},{"day":19,"title":"宜宾又地震了 给爸妈打电话的时候我忍住了眼泪","body":"宜宾地震4.2级。\n虽然不大但每次看到地震新闻还是会紧张。\n签文说'给家人打个电话'。\n于是给爸妈打了电话。聊了半小时，什么都聊了，就是没提地震。\n不想让他们担心。有些事自己扛着就好了。\n挂了电话之后鼻子有点酸。\n签文没有预测到地震，但它提醒我该打电话了。\n有些事不需要预测，只需要去做。","afterthought":"被感谢的感觉真的好。有时候做好事不是为了回报，就是被需要的感觉。","imageSuggestion":"防晒霜瓶子+便利店照片+签卡截图"},{"day":20,"title":"买了一瓶SPF50的防晒霜 收银小姐姐说的话让我破防","body":"买了一瓶SPF50的防晒霜。\n收银小姐姐说最近防晒卖疯了。\n我说是的，7月的太阳不讲道理。\n签文说'主动帮别人一个小忙'。\n在便利店帮一个阿姨扫码。她说谢谢你啊小伙子。\n虽然只是帮人扫了个码，但被感谢的感觉真的好。\n有时候做好事不是为了回报，就是那种被需要的感觉。很暖。","afterthought":"都是很小很小的事，但做完之后心情确实不一样了。","imageSuggestion":"一周签文合集+空调维修照片+咖啡杯"},{"day":21,"title":"这周从牛马进化成了晒干的牛马 但有一件事挺好的","body":"这周：空调坏了、地震新闻、高温预警。\n从牛马进化成了晒干的牛马。\n但有一件事挺好的——这周签文让我做的那些小事，大部分都做了。\n帮人扫了个码、给爸妈打了电话、整理了一下桌面。\n都是很小很小的事。但做完之后心情确实不一样了。\n下周一又是新的开始。咖啡先备好。","afterthought":"第一步不需要勇气，需要的是一个借口。签文就是那个借口。","imageSuggestion":"工资条打码+签卡截图+会议室照片"},{"day":22,"title":"老板说团队要有狼性 我看了看工资条觉得自己是羊","body":"老板在群里说'团队要有狼性'。\n我看了看自己的工位和工资条。\n觉得自己更像一只羊。\n签文说'把犹豫的事推进半步'。\n犹豫了很久要不要跟领导谈薪资。\n今天推了半步——约了下周三的一对一。\n不知道到时候有没有勇气开口。\n但至少迈出了第一步。\n有时候第一步不需要勇气，需要的是一个借口。签文就是那个借口。","afterthought":"看来得给爸妈科普一下怎么辨别谣言了。又多了一件事要做。","imageSuggestion":"朋友圈谣言截图+辟谣截图+签卡截图"},{"day":23,"title":"朋友圈又有人转发谣言了 为什么每次都有人中招","body":"朋友圈又有人转发谣言了。\n这次是'某地听到巨响'。官方辟谣说只是飞机音爆。\n每次这种消息都有人中招。\n签文说'把担心的事写下来'。\n写完了发现我担心的事里有一条是'爸妈会不会被谣言骗'。\n看来得找个时间给他们科普一下怎么辨别谣言了。\n又多了一件事要做。但总得做吧。","afterthought":"出发的意义不在于目的地，在于你可能遇到的东西。","imageSuggestion":"北海荷花展照片（多张）+签卡截图"},{"day":24,"title":"终于去了北海荷花展 照片不p都好看那种","body":"北海荷花展终于去了！！\n荷花开得真的太好看了！满池粉色，照片不p都好看。\n站在那里什么都不想，特别治愈。\n签文说'今天适合出发，哪怕只是换条路线走'。\n我下班故意换了条路回家，居然发现了一家新开的咖啡店。\n进去坐了一会儿，还不错。\n出发的意义不在于目的地，在于你可能遇到的东西。","afterthought":"有些路不是别人告诉你的，是你自己聊着聊就想通了。","imageSuggestion":"茶水间照片+签卡截图+老王工位"},{"day":25,"title":"同事吐槽领导画饼越来越大 我说我已经吃了三年了","body":"茶水间同事跟我吐槽领导画的饼越来越大。\n我说兄弟，你这饼我已经吃了三年了，牙都吃歪了。\n签文说'主动请教前辈或长辈'。\n想了想，我唯一能请教的前辈就是工位对面的老王。\n下午找他聊了聊。虽然没有明确答案，但至少理清了一些思路。\n有些路不是别人告诉你的，是你自己聊着聊就想通的。","afterthought":"高铁通不到家门口，但至少邮件可以清理干净。小事也有成就感。","imageSuggestion":"高铁新闻截图+清理前后的邮箱截图对比"},{"day":26,"title":"新高铁线路开通 评论区全是同一个问题","body":"新高铁线路开通了！\n评论区全是'什么时候通到我家门口'。\n我也想知道。\n签文说'清理一下桌面和inbox'。\n今天真的花了半小时整理邮件。\n删了一百多封不用回的。瞬间清爽了。\n高铁通不到家门口，但至少邮件可以清理干净。\n小事也有成就感。","afterthought":"如果你最近压力大，推荐去荷花园走走。不需要什么理由。","imageSuggestion":"荷花展照片（九宫格）+签卡截图+朋友合照"},{"day":27,"title":"北海荷花展太美了 站在那里什么都不想 特别治愈","body":"北海荷花展太美了。\n第二次去了，这次带了好朋友一起。\n站在荷花池边，什么都不想。\n签文说'给自己留15分钟什么都不做'。\n不用刻意留了。在荷花池边站着的每一分钟都是放空。\n拍了好多照片，选了几张特别满意的。\n如果你最近压力大，推荐去荷花园走走。不需要什么理由。","afterthought":"每天早上的那三分钟，已经是我一天中最安静的时刻了。","imageSuggestion":"一个月签卡合集截图+手机相册截图"},{"day":28,"title":"月底了 回顾这个月的30张签 居然有些感动","body":"月底了。\n这个月从核聚变看到洪水看到高考志愿看到乘风看到裁员看到地震看到荷花展。\n信息过载到有点麻木。\n签文说'回顾这一个月的变化'。\n翻了翻手机相册，这一个月的照片大部分是签卡截图。\n不知不觉已经成习惯了。\n说不上来到底有没有用。但每天早上的那三分钟，已经是我一天中最安静的时刻了。","afterthought":"比起远方的洪水，眼前的账单也很重要。但至少我们都还在努力。","imageSuggestion":"救援队员照片（公开新闻图）+签卡截图"},{"day":29,"title":"西江洪水终于退了 但这个画面我忘不了","body":"西江洪水终于退了。\n看到救援队员满身泥水席地而睡的照片，鼻子一酸。\n签文说'做长远规划，看到的格局会更大'。\n我看了眼银行余额和信用卡账单。\n觉得自己应该规划的先不是三年后，而是下个月的开支。\n不过能想到这里，也算一种进步吧。\n比起远方的洪水，眼前的账单也很重要。但至少我们都还在努力。","afterthought":"7月辛苦了，大家注意安全。台风天备好水和泡面。","imageSuggestion":"7月最后一张签卡截图+日历照片+泡面和水"},{"day":30,"title":"7月最后一天了 这个月的30张签我都看了","body":"7月30号。这个月最后的工作日。\n台风又在路上了，防汛还没结束。\n这一个月从核聚变到洪水到高考到乘风到裁员到地震到荷花展到台风。\n签文说'为下个月做好准备'。\n我觉得可以先准备一瓶水一袋泡面，然后再想别的。\n三十张签看完了。明天8月1号，新的一轮。\n居然有点期待。这可能就是习惯的力量吧。\n7月辛苦了，大家注意安全。","afterthought":"三十张签看完了。明天8月，新的一轮开始了。你们要不要一起？","imageSuggestion":"7月总结签文合集+手机截图"}];
const mpArticles = [{"id": "week1-intro", "title": "为什么我每天花3分钟做这件事？", "subtitle": "不是算命，是一种新的心理仪式感", "publishWeek": 1, "sections": [{"heading": "我为什么会做这个小工具", "content": "上个月有段时间特别焦虑。每天早上醒来不知道今天该干嘛，刷半小时手机才能清醒。后来我发现，人需要的不是更多的信息，而是一个'今天从这里开始'的锚点。\n\n于是做了这个小程序。每天早上抽一张签，看一句签文，做一件小事。3分钟。\n\n不是算命。签文不预测未来，只是给你一个今天可以关注的方向。做不做，还是你自己决定。"}, {"heading": "这30天我抽到了什么", "content": "大吉签4张，上上签8张，平签3张，解签1张。\n\n最准的是'贵人指路'那天。签文让我留意身边主动给建议的人。当天下午，一个很久没联系的朋友发来一条消息，带来了一个合作机会。\n\n最意外的是'小阻'那天。抽到的时候有点沮丧，但签文说'今天慢一点不是坏事'。我停下来检查了一下正在推进的项目，发现了一个之前忽略的风险。\n\n签卡不是预言，是镜子。"}, {"heading": "适合什么样的人", "content": "- 每天早上醒来有点迷茫的人\n- 想要一点仪式感但不想太复杂的人\n- 觉得传统算命太沉重，但偶尔想听听'建议'的人\n- 喜欢收集、打卡、完成小目标的人\n\n不适合：\n- 想找'大师'改命的人\n- 希望签卡直接告诉你股票买哪只的人\n- 觉得3分钟也是浪费时间的人"}, {"heading": "怎么开始", "content": "很简单。\n\n微信小程序搜索'今日上上签'，不用下载，点开就能抽。\n\n每天免费3次。抽完看签文，做微行动。\n\n集齐一套签卡还能获得称号。\n\n就这么简单。"}], "cta": "点击下方的'今日上上签'小程序卡片，去抽你的第一张签。"}, {"id": "week2-collection", "title": "我集齐了所有大吉签，获得了这个称号", "subtitle": "牌册系统的隐藏乐趣", "publishWeek": 2, "sections": [{"heading": "从一张到一套", "content": "刚开始只是每天抽一张，看完就忘了。\n\n后来发现有个'牌册'功能，抽到的签卡会自动收藏。看着牌册里一张张亮起来的卡片，突然有了集齐的冲动。\n\n大吉签有4张，上上签有5张，上签4张，平签4张。还有彩蛋签。\n\n集齐同一等级的全部签卡，会获得一个称号。"}, {"heading": "称号系统", "content": "集齐大吉签 → '大吉之人'\n集齐上上签 → '福星高照'\n集齐上签 → '稳步前行'\n集齐平签 → '波澜不惊'\n集齐彩蛋签 → '奇遇收藏家'\n\n称号会显示在顶部品牌区，也会显示在好友榜里。\n\n'大吉之人'的称号还有特殊的金红渐变特效和烟花粒子动画。看到它发光的时候，真的有点成就感。"}, {"heading": "彩蛋签是最难的", "content": "彩蛋签概率4.5%，大概22次出1次。\n\n有四种主题：桃花签（粉色）、金榜签（金色）、归家签（蓝色）、远行签（青绿色）。\n\n每张都有独特的底纹图案和边框流光特效。\n\n我花了将近一个月才集齐四种。\n\n集齐'奇遇收藏家'称号的时候，它显示的是彩虹渐变流动效果。\n\n值。"}, {"heading": "不只是收集", "content": "回头看牌册里30多张签卡，像一本浓缩的月度日记。\n\n能看到自己什么时候状态好（大吉签多），什么时候需要调整（平签多），什么时候在回避问题（解签出现）。\n\n数据不会撒谎。"}], "cta": "去小程序看看你现在的牌册里有多少张签卡了。"}, {"id": "week3-share", "title": "分享率最高的签卡，居然是这一张", "subtitle": "我们用数据找到了社交裂变的秘密", "publishWeek": 3, "sections": [{"heading": "哪张签最常被分享", "content": "上线第一周，我们统计了所有分享行为。\n\n分享率最高的不是大吉签，是'贵人指路'。\n\n其次是'财气临门'。\n\n原因可能很简单：大吉签的签文更具体，更容易让人产生'这说的就是我'的感觉。\n\n而平签的分享率最低。不是因为不好，是因为人们不太愿意分享'今天运气一般'。"}, {"heading": "7套分享模板，哪套最好看", "content": "经典签文版：最像传统签卡，长辈也喜欢\n极简文字版：年轻人最爱，发朋友圈高级感\n国风墨色版：小红书点赞率最高\n职场加油版：工作日早上转发最多\n周末治愈版：周六周日使用频率最高\n情绪日记版：深夜时段突然变多\n好运爆棚版：颜色最鲜艳，视觉冲击最强\n\n建议：不同场景用不同模板。早上职场版，周末治愈版，深夜情绪版。"}, {"heading": "分享文案怎么写", "content": "我们测试了几种文案风格：\n\n1. 直接型：'今天抽到的签，有点准' → 点击率中等\n2. 悬念型：'这张签说的好像是你' → 点击率最高\n3. 情感型：'焦虑的时候，抽张签冷静一下' → 转发率最高\n4. 数据型：'连续7天抽到大吉签的概率是？' → 评论率最高\n\n结论：悬念型标题+情感型正文，组合效果最好。"}, {"heading": "裂变的核心", "content": "不是让用户觉得'这个工具很厉害'。\n\n是让抽卡的人觉得'这张签说的就是我'。\n\n然后自然想分享给身边的人。\n\n最好的裂变不是'帮我转发'，是'你也来试试这个准不准'。"}], "cta": "去小程序抽一张签，生成你的专属分享图。"}, {"id": "week4-holiday", "title": "节日限定签卡来了，只出现3天", "subtitle": "中秋/国庆/元旦，专属签卡+专属视觉", "publishWeek": 4, "sections": [{"heading": "为什么做节日限定", "content": "日常签卡是通用的。\n\n但节日的时候，人的情绪状态和日常不一样。\n\n中秋想团圆，国庆想放松，元旦想规划。\n\n通用签文很难精准匹配这些情绪。\n\n所以我们做了节日限定签卡。"}, {"heading": "中秋限定：月圆+团圆", "content": "专属签卡'月圆'：今天适合给在意的人发一句问候。\n\n专属签卡'团圆'：不管多远，心意到了就是团圆。\n\n背景换成深紫蓝色，金色点缀。\n\n抽到中秋签卡的人，分享率比平时高40%。\n\n因为节日情绪本身就是社交货币。"}, {"heading": "节日签卡怎么玩", "content": "1. 节日当天打开小程序，自动切换节日主题\n2. 抽到专属签卡的概率提升\n3. 专属签卡有独特的视觉设计和文案\n4. 集齐全年节日签卡，可获得隐藏称号\n\n今年已规划节日：\n- 中秋（3天）\n- 国庆（7天）\n- 元旦（3天）\n- 情人节（1天）\n- 劳动节（3天）\n- 端午（3天）"}, {"heading": "下一个节日是？", "content": "看看日历，下一个节日不远了。\n\n到时候记得打开小程序，抽一张节日限定签卡。\n\n只有那几天有。\n\n错过了就要等一年。"}], "cta": "去小程序看看现在的节日主题签卡。"}];

 "caption": "3个人来问在哪抽的"}], "bgm": "轻快活泼BGM", "caption": "分享出去，真的有人会问", "hashtags": "#分享 #朋友圈 #社交 #裂变 #小程序"}];

/* ============ 推荐规则引擎 ============ */

// 判断是否为工作日（周一到周五，即每7天中的第1-5天）
function isWorkday(day) {
  const mod = ((day - 1) % 7) + 1;
  return mod >= 1 && mod <= 5;
}

// 判断是否为周六
function isSaturday(day) {
  const mod = ((day - 1) % 7) + 1;
  return mod === 6;
}

// 判断是否为周日
function isSunday(day) {
  const mod = ((day - 1) % 7) + 1;
  return mod === 7;
}

// 获取微信群推荐
function getWxRecommend(day) {
  const result = {};

  // 推荐分享模板
  if (isWorkday(day)) {
    result.template = shareTemplates.office;
  } else if (isSaturday(day)) {
    result.template = shareTemplates.weekend;
  } else {
    result.template = shareTemplates.minimal;
  }

  // 推荐签卡：每天轮换一张大吉签（30天循环6张，每张出现5次）
  const sealIndex = Math.floor((day - 1) / 5) % daJiSeals.length;
  result.sealCard = { type: '大吉签', ...daJiSeals[sealIndex] };

  // 推荐今日金句
  result.quote = dailyQuotes[day - 1];

  return result;
}

// 获取小红书推荐
function getXhsRecommend(day) {
  const result = {};

  // 推荐分享模板
  if (day >= 1 && day <= 7) {
    result.template = shareTemplates.classic;
  } else if (day >= 8 && day <= 14) {
    result.template = shareTemplates['ink-wash'];
  } else if (day >= 15 && day <= 21) {
    result.template = shareTemplates.mood;
  } else if (day >= 22 && day <= 28) {
    result.template = shareTemplates.luck;
  } else {
    result.template = shareTemplates.classic;
  }

  // 推荐签卡：大吉签和上上签交替，彩蛋签在第4、16、25天出现
  if (day === 4) {
    result.sealCard = { type: '彩蛋签', ...caiDanSeals[0] }; // 桃花
  } else if (day === 16) {
    result.sealCard = { type: '彩蛋签', ...caiDanSeals[1] }; // 金榜
  } else if (day === 25) {
    result.sealCard = { type: '彩蛋签', ...caiDanSeals[2] }; // 归家
  } else {
    // 大吉签和上上签交替：奇数天大吉签，偶数天上上签
    const alternate = (day % 2 === 1);
    if (alternate) {
      // 大吉签轮换
      const idx = Math.floor((day - 1) / 2) % daJiSeals.length;
      result.sealCard = { type: '大吉签', ...daJiSeals[idx] };
    } else {
      // 上上签轮换
      const idx = Math.floor((day - 2) / 2) % shangShangSeals.length;
      result.sealCard = { type: '上上签', ...shangShangSeals[idx] };
    }
  }

  // 配图建议
  result.imageSuggestion = result.sealCard.type + ' \u00b7 ' + result.sealCard.name + '（' + result.sealCard.seal + '） + ' + result.template.name + '模板';

  return result;
}

// 获取公众号推荐（每周一）

  const result = {};

  const mpSealMap = {

    3: daJiSeals[5], // 第3周：紫气东来
    4: daJiSeals[4]  // 第4周：锦绣前程
  };

  if (mpSealMap[weekNum]) {
    result.sealCard = { type: '大吉签', ...mpSealMap[weekNum] };
  }

  return result;
}

// 获取抖音推荐（每周三）
function getDyRecommend(weekNum) {
  const result = {};

  // 推荐分享模板
  const dyTemplateMap = {
    1: 'minimal',
    2: 'luck',
    3: 'classic',
    4: 'ink-wash'
  };
  result.template = shareTemplates[dyTemplateMap[weekNum] || 'classic'];

  // 推荐签卡
  if (weekNum === 2) {
    // 第2周彩蛋：桃花
    result.sealCard = { type: '彩蛋签', ...caiDanSeals[0] };
  } else {
    const dySealMap = {
      1: shangShangSeals[1], // 第1周：步步高升
      3: daJiSeals[2],      // 第3周：财源广进
      4: shangShangSeals[4]  // 第4周：福星高照
    };
    if (dySealMap[weekNum]) {
      const sealType = weekNum === 3 ? '大吉签' : '上上签';
      result.sealCard = { type: sealType, ...dySealMap[weekNum] };
    }
  }

  return result;
}

function getPhase(day) {
  if (day <= 7) return '种子测试阶段（30-50人内测）';
  if (day <= 14) return '冷启动W1（验证分享率）';
  if (day <= 21) return '冷启动W2（验证广告留存）';
  return '首月冲刺（完成3次迭代）';
}

function getWeekDay(day) {
  const days = ['周日','周一','周二','周三','周四','周五','周六'];
  // 假设第1天是周一
  return days[day % 7];
}

function renderCalendar() {
  const grid = document.getElementById('calendar');
  grid.innerHTML = '';
  
  // 星期标题
  const headers = ['一','二','三','四','五','六','日'];
  headers.forEach(h => {
    const el = document.createElement('div');
    el.className = 'cal-header';
    el.textContent = h;
    grid.appendChild(el);
  });
  
  // 第1天是周一，前面不需要空白
  for (let w = 1; w <= 5; w++) {
    const label = document.createElement('div');
    label.className = 'week-label';
    label.textContent = '第' + w + '周';
    grid.appendChild(label);
    
    for (let d = 1; d <= 7; d++) {
      const dayNum = (w-1)*7 + d;
      if (dayNum > 30) break;
      
      const el = document.createElement('div');
      el.className = 'cal-day' + (dayNum === currentDay ? ' active' : '');
      el.onclick = () => selectDay(dayNum);
      
      const num = document.createElement('div');
      num.className = 'd-num';
      num.textContent = dayNum;
      el.appendChild(num);
      
      const tags = document.createElement('div');
      tags.className = 'd-tags';
      tags.innerHTML = '<div class="d-tag tag-wx"></div><div class="d-tag tag-xhs"></div>';
      if ([1,8,15,22].includes(dayNum)) tags.innerHTML += '<div class="d-tag tag-mp"></div>';
      if ([3,10,17,24].includes(dayNum)) tags.innerHTML += '<div class="d-tag tag-dy"></div>';
      el.appendChild(tags);
      
      grid.appendChild(el);
    }
  }
}

function selectDay(day) {
  currentDay = day;
  renderCalendar();
  renderDay();
}

function prevDay() { if (currentDay > 1) selectDay(currentDay - 1); }
function nextDay() { if (currentDay < 30) selectDay(currentDay + 1); }
