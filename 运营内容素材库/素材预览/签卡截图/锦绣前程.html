<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=375, initial-scale=1.0">
<title>锦绣前程 · 签卡截图</title>
<style>
body{margin:0;background:#111;display:flex;justify-content:center;align-items:center;min-height:100vh;padding:20px;}
.phone{width:375px;height:812px;border-radius:40px;overflow:hidden;box-shadow:0 30px 80px rgba(0,0,0,.7);position:relative;}
</style></head>
<body>
<div class="phone">
<div style="width:290px;border-radius:24px;padding:28px 22px;position:relative;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.5);display:flex;flex-direction:column;background:linear-gradient(160deg, #fff0c4, #f0b34d);color:#48160c;min-height:420px;">
  
  <div style="font-size:12px;letter-spacing:2px;opacity:.7;margin-bottom:12px;">大吉签</div>
  <div style="position:absolute;top:28px;right:24px;width:44px;height:52px;border-radius:8px;background:#c51f1a;color:#fff7e8;display:flex;align-items:center;justify-content:center;flex-direction:column;font-size:20px;font-weight:700;transform:rotate(5deg);">锦<span style="font-size:10px;margin-top:2px;">今日</span></div>
  <div style="font-size:32px;font-weight:800;line-height:1.1;margin-top:20px;font-family:Georgia,serif;">锦绣前程</div>
  <div style="font-size:13px;line-height:1.6;margin-top:14px;opacity:.85;">今天适合做一件能留下痕迹的小事，它会慢慢变成大事。</div>
  <div style="display:flex;gap:8px;margin-top:18px;">
    <div style="border:1px solid rgba(0,0,0,.15);border-radius:12px;padding:10px 12px;font-size:12px;flex:1;background:rgba(255,255,255,.1);"><strong style="color:#c51f1a;display:block;font-size:14px;margin-bottom:2px;">宜</strong>落笔</div>
    <div style="border:1px solid rgba(0,0,0,.15);border-radius:12px;padding:10px 12px;font-size:12px;flex:1;background:rgba(255,255,255,.1);"><strong style="color:#c51f1a;display:block;font-size:14px;margin-bottom:2px;">忌</strong>空想</div>
  </div>
  <div style="margin-top:14px;padding:14px;border-radius:14px;font-size:12px;line-height:1.5;background:rgba(0,0,0,.08);"><strong style="color:#c51f1a;display:block;margin-bottom:4px;">微行动</strong>写一条今天的工作或学习记录。</div>
  <div style="position:absolute;bottom:14px;right:18px;font-size:11px;opacity:.5;">score: 96</div>
</div>
</div>
<div style="position:fixed;bottom:20px;left:50%;transform:translateX(-50%);color:#666;font-size:12px;text-align:center;">
  <div>375×812px · 可直接截图使用</div>
  <div style="margin-top:4px;">今日上上签 · 锦绣前程</div>
</div>
</body></html>
